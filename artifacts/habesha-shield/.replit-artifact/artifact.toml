kind = "web"
previewPath = "/"
title = "HabeshaShield"
version = "1.0.0"
id = "artifacts/habesha-shield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21661

[services.development]
run = "pnpm --filter @workspace/habesha-shield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/habesha-shield", "run", "build" ]
publicDir = "artifacts/habesha-shield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21661"
BASE_PATH = "/"
